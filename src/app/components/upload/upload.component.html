<div class="upload-container">
  <div class="upload-card">
    <div class="upload-header">
      <h2>📷 Photo Map</h2>
      <p class="subtitle">Drop photos with GPS metadata</p>
      <p class="pin-counter">📍 Pins on map: {{ pinCount }}</p>
    </div>

    <div
      class="upload-area"
      [class.dragging]="isDraggingOver"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
    >
      <div class="upload-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4285f4" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p class="drop-text">Drag photos here</p>
      <span class="or-divider">or</span>
      <label class="upload-btn" [class.disabled]="isUploading">
        <input
          type="file"
          multiple
          accept="image/*,.heic,.heif"
          (change)="onFileSelected($event)"
          [disabled]="isUploading"
        />
        {{ isUploading ? 'Processing...' : 'Choose Files' }}
      </label>
    </div>

    <div class="upload-results" *ngIf="uploadItems.length > 0">
      <div class="result-header">
        <span>{{ uploadItems.length }} file(s)</span>
        <button type="button" class="clear-btn" (click)="clearItems()" *ngIf="!isUploading">Clear</button>
      </div>
      <div
        class="result-item"
        *ngFor="let item of uploadItems"
        [class.success]="item.status === 'success'"
        [class.error]="item.status === 'error'"
        [class.processing]="item.status === 'processing'"
      >
        <div class="result-icon">
          <span *ngIf="item.status === 'processing'" class="spinner"></span>
          <span *ngIf="item.status === 'success'">✓</span>
          <span *ngIf="item.status === 'error'">✕</span>
        </div>
        <div class="result-text">
          <div class="file-name">{{ item.fileName }}</div>
          <div class="file-status">{{ item.message }}</div>
        </div>
      </div>
    </div>
  </div>
</div>
